<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Canvas Collector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* トースト通知用のアニメーション */
        .toast-enter { opacity: 0; transform: translateY(100%); }
        .toast-enter-active { opacity: 1; transform: translateY(0); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .toast-leave { opacity: 1; transform: translateY(0); }
        .toast-leave-active { opacity: 0; transform: translateY(100%); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* スクロールバーのカスタマイズ (ダークモード用) */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background-color: #3f3f46; border-radius: 10px; border: 2px solid #18181b; }
        textarea::-webkit-scrollbar-thumb:hover { background-color: #52525b; }
        
        /* すりガラス効果 (ダークモード用) */
        .glass-header {
            background: rgba(24, 24, 27, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-zinc-950 h-screen flex flex-col font-sans text-zinc-300 overflow-hidden antialiased selection:bg-blue-900 selection:text-blue-100">

    <!-- ヘッダー -->
    <header class="glass-header border-b border-zinc-800/80 py-4 px-6 flex-shrink-0 flex justify-center items-center z-10 shadow-sm">
        <h1 class="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-zinc-100 to-zinc-400 flex items-center gap-2 tracking-tight">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#blue-gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <defs>
                    <linearGradient id="blue-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#60a5fa" />
                        <stop offset="100%" stop-color="#818cf8" />
                    </linearGradient>
                </defs>
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                <polyline points="14 2 14 8 20 8"/>
            </svg>
            Local Canvas Collector
        </h1>
    </header>

    <!-- メインコンテンツ (テキストエリア) -->
    <main class="flex-grow flex flex-col p-4 md:p-8 overflow-hidden bg-zinc-950">
        <div class="flex-grow flex flex-col bg-zinc-900 rounded-2xl shadow-inner border border-zinc-800 overflow-hidden focus-within:ring-1 focus-within:ring-zinc-600 focus-within:border-zinc-600 transition-all duration-300">
            <textarea id="editor" 
                class="flex-grow w-full p-6 md:p-8 resize-none outline-none text-base leading-relaxed bg-transparent text-zinc-200 placeholder:text-zinc-600 font-mono" 
                placeholder="ここにAIの出力テキストなどを入力、またはペーストしてください..."></textarea>
        </div>
    </main>

    <!-- コントロールパネル (ボタン群) -->
    <footer class="bg-zinc-950 border-t border-zinc-800/80 p-5 flex-shrink-0 z-10 shadow-[0_-4px_10px_-1px_rgba(0,0,0,0.2)]">
        <div class="w-full max-w-7xl mx-auto relative flex flex-col md:flex-row justify-center items-center gap-4">
            
            <!-- 中央のメインボタン群 -->
            <div class="flex flex-col sm:flex-row gap-3 justify-center items-center w-full md:w-auto">
                
                <!-- 1. プロジェクトフォルダ選択 -->
                <button id="btn-set-dir" class="flex items-center justify-center gap-2 px-5 py-2.5 bg-zinc-900 hover:bg-zinc-800 text-zinc-400 hover:text-zinc-200 border border-zinc-800 rounded-xl font-medium transition-all duration-200 w-full sm:w-auto hover:border-zinc-700" title="保存・読み込みの初期フォルダを指定します">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/><path d="M12 10v6"/><path d="M9 13h6"/></svg>
                    プロジェクトフォルダを選択
                </button>

            <div class="hidden sm:block w-px h-8 bg-zinc-800 mx-1"></div>

            <!-- 2. 保存 -->
            <button id="btn-save" class="flex items-center justify-center gap-2 px-6 py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-semibold transition-all duration-200 shadow-md shadow-blue-900/20 hover:shadow-blue-900/40 w-full sm:w-auto active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                保存
            </button>

            <!-- 3. 読み込み -->
            <button id="btn-load" class="flex items-center justify-center gap-2 px-6 py-2.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded-xl font-medium transition-all duration-200 shadow-sm w-full sm:w-auto active:scale-95 border border-zinc-700 hover:border-zinc-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                読み込み
            </button>

            <!-- セパレーター (PC表示のみ) -->
            <div class="hidden sm:block w-px h-8 bg-zinc-800 mx-1"></div>

            <!-- 4. コピペ -->
            <button id="btn-copy" class="flex items-center justify-center gap-2 px-6 py-2.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded-xl font-medium transition-all duration-200 shadow-sm w-full sm:w-auto active:scale-95 border border-zinc-700 hover:border-zinc-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                コピペ
            </button>
            </div>

            <!-- 右側のクリアボタン -->
            <div class="md:absolute md:right-0 flex justify-center w-full md:w-auto border-t border-zinc-800 pt-4 md:border-0 md:pt-0 mt-2 md:mt-0">
                <button id="btn-clear" class="flex items-center justify-center gap-2 px-5 py-2.5 bg-zinc-900 hover:bg-red-950/40 text-zinc-500 hover:text-red-400 border border-zinc-800 hover:border-red-900/50 rounded-xl font-medium transition-all duration-200 w-full sm:w-auto active:scale-95" title="テキストをすべて消去">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    クリア
                </button>
            </div>
        </div>
    </footer>

    <!-- トースト通知コンテナ -->
    <div id="toast-container" class="fixed bottom-28 left-1/2 transform -translate-x-1/2 flex flex-col gap-2 z-50 pointer-events-none"></div>

    <script>
        // DOM要素
        const editor = document.getElementById('editor');
        const btnCopy = document.getElementById('btn-copy');
        const btnSave = document.getElementById('btn-save');
        const btnLoad = document.getElementById('btn-load');
        const btnSetDir = document.getElementById('btn-set-dir');
        const btnClear = document.getElementById('btn-clear');
        const toastContainer = document.getElementById('toast-container');

        // --- トースト通知 ---
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'bg-zinc-800/95 backdrop-blur-sm text-zinc-100 px-6 py-3 rounded-xl shadow-2xl text-sm font-medium transition-all duration-300 opacity-0 translate-y-4 flex items-center gap-2 border border-zinc-700';
            
            // アイコン追加
            toast.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                               <span>${message}</span>`;
            
            toastContainer.appendChild(toast);
            requestAnimationFrame(() => {
                toast.classList.remove('opacity-0', 'translate-y-4');
                toast.classList.add('opacity-100', 'translate-y-0');
            });
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- ファイル名生成 ---
        function getSuggestedFilename(text) {
            const lines = text.split('\n');
            let firstLine = '';
            for (const line of lines) {
                if (line.trim() !== '') { firstLine = line.trim(); break; }
            }
            if (!firstLine) return 'untitled.txt';
            let filename = firstLine.replace(/[\\/:*?"<>|]/g, '_');
            if (filename.length > 50) filename = filename.substring(0, 50);
            return `${filename}.txt`;
        }

        // --- フォルダハンドルの記憶 (IndexedDB) ---
        const DB_NAME = 'CanvasCollectorDB';
        const STORE_NAME = 'handles';
        const DIR_KEY = 'defaultDir';

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    e.target.result.createObjectStore(STORE_NAME);
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveDirHandle(handle) {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).put(handle, DIR_KEY);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function getDirHandle() {
            try {
                const db = await initDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const req = tx.objectStore(STORE_NAME).get(DIR_KEY);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            } catch (e) {
                return null;
            }
        }

        // --- 初期フォルダ設定機能 ---
        async function handleSetDir() {
            if (!window.showDirectoryPicker) {
                showToast('お使いのブラウザはフォルダ選択に対応していません');
                return;
            }
            try {
                const dirHandle = await window.showDirectoryPicker({
                    id: 'local-canvas-collector-setup',
                    startIn: 'desktop'
                });
                await saveDirHandle(dirHandle);
                showToast('プロジェクトフォルダを設定しました');
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error('フォルダ設定エラー:', err);
                    showToast('フォルダの設定に失敗しました');
                }
            }
        }

        // --- コピペ機能 ---
        async function handleCopy() {
            const text = editor.value;
            if (!text) { 
                const emptyToast = document.createElement('div');
                emptyToast.className = 'bg-red-900/95 backdrop-blur-sm text-red-100 px-6 py-3 rounded-xl shadow-2xl text-sm font-medium transition-all duration-300 opacity-0 translate-y-4 flex items-center gap-2 border border-red-800';
                emptyToast.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg><span>コピーするテキストがありません</span>`;
                toastContainer.appendChild(emptyToast);
                requestAnimationFrame(() => {
                    emptyToast.classList.remove('opacity-0', 'translate-y-4');
                    emptyToast.classList.add('opacity-100', 'translate-y-0');
                });
                setTimeout(() => {
                    emptyToast.classList.remove('opacity-100', 'translate-y-0');
                    emptyToast.classList.add('opacity-0', 'translate-y-4');
                    setTimeout(() => emptyToast.remove(), 300);
                }, 3000);
                return; 
            }
            try {
                await navigator.clipboard.writeText(text);
                showToast('コピーしました');
            } catch (err) {
                const tempTextArea = document.createElement('textarea');
                tempTextArea.value = text;
                tempTextArea.style.position = 'fixed';
                tempTextArea.style.left = '-9999px';
                document.body.appendChild(tempTextArea);
                tempTextArea.focus();
                tempTextArea.select();
                try {
                    document.execCommand('copy');
                    showToast('コピーしました');
                } catch (e) {
                    showToast('コピーに失敗しました');
                }
                document.body.removeChild(tempTextArea);
            }
        }

        // --- 保存機能 ---
        async function handleSave() {
            const text = editor.value;
            const suggestedName = getSuggestedFilename(text);

            const fallbackSave = () => {
                const blob = new Blob([text], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = suggestedName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('保存しました');
            };

            if (window.showSaveFilePicker) {
                try {
                    const defaultDirHandle = await getDirHandle();
                    
                    const handle = await window.showSaveFilePicker({
                        suggestedName: suggestedName,
                        id: 'local-canvas-collector-dir', 
                        startIn: defaultDirHandle || 'desktop',
                        types: [{ description: 'テキストファイル', accept: { 'text/plain': ['.txt'] } }],
                    });
                    
                    const writable = await handle.createWritable();
                    await writable.write(text);
                    await writable.close();
                    
                    showToast('保存しました');
                } catch (err) {
                    if (err.name === 'AbortError') return;
                    if (err.name === 'SecurityError' || err.message.includes('Cross origin')) {
                        fallbackSave();
                    } else {
                        console.error('保存エラー:', err);
                        showToast('保存に失敗しました');
                    }
                }
            } else {
                fallbackSave();
            }
        }

        // --- 読み込み機能 ---
        async function handleLoad() {
            const fallbackLoad = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.txt';
                input.onchange = e => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = e => {
                        editor.value = e.target.result;
                        showToast('読み込みました');
                    };
                    reader.readAsText(file);
                };
                input.click();
            };

            if (window.showOpenFilePicker) {
                try {
                    const defaultDirHandle = await getDirHandle();

                    const [handle] = await window.showOpenFilePicker({
                        id: 'local-canvas-collector-dir',
                        startIn: defaultDirHandle || 'desktop',
                        multiple: false,
                        types: [{ description: 'テキストファイル', accept: { 'text/plain': ['.txt'] } }],
                    });
                    
                    const file = await handle.getFile();
                    const text = await file.text();
                    
                    editor.value = text;
                    showToast('読み込みました');
                } catch (err) {
                    if (err.name === 'AbortError') return;
                    if (err.name === 'SecurityError' || err.message.includes('Cross origin')) {
                        fallbackLoad();
                    } else {
                        console.error('読み込みエラー:', err);
                        showToast('読み込みに失敗しました');
                    }
                }
            } else {
                fallbackLoad();
            }
        }

        // --- クリア機能 ---
        function handleClear() {
            if (!editor.value) return;
            
            editor.focus();
            editor.select();
            try {
                // Ctrl+Z (Undo) で復元できるように execCommand を使用して消去
                if (!document.execCommand('insertText', false, '')) {
                    editor.value = '';
                }
            } catch (e) {
                editor.value = '';
            }
            showToast('テキストをクリアしました');
        }

        // イベントリスナーの登録
        btnSetDir.addEventListener('click', handleSetDir);
        btnCopy.addEventListener('click', handleCopy);
        btnSave.addEventListener('click', handleSave);
        btnLoad.addEventListener('click', handleLoad);
        btnClear.addEventListener('click', handleClear);

        // キーボードショートカット (Ctrl+S / Cmd+S で保存)
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                handleSave();
            }
        });

    </script>
</body>
</html>
